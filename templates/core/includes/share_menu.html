<details class="share-menu" data-share-menu>
  <summary class="share-summary" aria-label="{{ share_aria_label|default:'Share' }}">{{ share_label|default:"Share" }}</summary>
  <div class="share-panel">
    <button
      type="button"
      class="share-native"
      data-share-native
      data-share-type="{{ share_type }}"
      data-share-title="{{ share_title }}"
      data-share-description="{{ share_description|default:'' }}"
      data-share-url="{{ share_url }}"
      data-share-curator="{{ share_curator|default:'' }}">
      Share with apps
    </button>
    <button
      type="button"
      aria-label="Copy link"
      data-copy-link
      data-share-url="{{ share_url }}">
      Copy link
    </button>
    <button
      type="button"
      data-copy-share-text
      data-share-type="{{ share_type }}"
      data-share-title="{{ share_title }}"
      data-share-description="{{ share_description|default:'' }}"
      data-share-url="{{ share_url }}"
      data-share-curator="{{ share_curator|default:'' }}">
      Copy share text
    </button>
    <span class="share-status" data-share-status role="status" aria-live="polite"></span>
  </div>
</details>
